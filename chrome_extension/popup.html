<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Korail Macro</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="topbar">
        <div>
          <h1>Korail Macro</h1>
          <p>취소표 설정</p>
        </div>
        <span class="status" id="status">준비</span>
      </header>

      <section class="grid two">
        <label>
          출발
          <input id="dep" list="stations" value="서울">
        </label>
        <label>
          도착
          <input id="arr" list="stations" value="부산">
        </label>
      </section>

      <section class="secure-box">
        <div class="section-head">
          <strong>로그인</strong>
          <label class="inline-check">
            <input id="saveLoginSecure" type="checkbox" checked>
            보안 저장
          </label>
        </div>
        <label>
          코레일 ID
          <input id="korailId" autocomplete="username" placeholder="회원번호/이메일/전화번호">
        </label>
        <label>
          비밀번호
          <input id="korailPassword" type="password" autocomplete="current-password" placeholder="코레일 비밀번호">
        </label>
      </section>

      <section class="secure-box">
        <div class="section-head">
          <strong>결제정보</strong>
          <label class="inline-check">
            <input id="savePaymentSecure" type="checkbox">
            보안 저장
          </label>
        </div>
        <section class="grid two">
          <label>
            카드번호
            <input id="cardNumber" inputmode="numeric" autocomplete="off" maxlength="19" placeholder="숫자만">
          </label>
          <label>
            카드 비밀번호
            <input id="cardPassword" type="password" inputmode="numeric" autocomplete="off" maxlength="2" placeholder="앞 2자리">
          </label>
        </section>
        <section class="grid two">
          <label>
            유효기간
            <input id="cardExpire" inputmode="numeric" autocomplete="off" maxlength="4" placeholder="YYMM">
          </label>
          <label>
            인증번호
            <input id="cardValidation" type="password" inputmode="numeric" autocomplete="off" maxlength="10" placeholder="생년월일/사업자번호">
          </label>
        </section>
        <label class="inline-check">
          <input id="cardCorporate" type="checkbox">
          법인카드
        </label>
        <label class="inline-check payment-warning">
          <input id="autoPayment" type="checkbox">
          예약 성공 시 자동결제
        </label>
      </section>

      <section class="grid two">
        <label>
          날짜
          <input id="date" type="date">
        </label>
        <label>
          시간
          <input id="time" type="time" step="60">
        </label>
      </section>

      <section class="grid two">
        <label>
          열차
          <select id="trainType">
            <option value="KTX">KTX</option>
            <option value="ALL">전체</option>
            <option value="KTX_SANCHEON">KTX-산천</option>
            <option value="ITX_SAEMAEUL">ITX-새마을</option>
            <option value="MUGUNGHWA">무궁화</option>
            <option value="ITX_CHEONGCHUN">ITX-청춘</option>
          </select>
        </label>
        <label>
          예약옵션
          <select id="reserveOption">
            <option value="GENERAL_ONLY">일반실만</option>
            <option value="GENERAL_FIRST">일반실 우선</option>
            <option value="SPECIAL_ONLY">특실만</option>
            <option value="SPECIAL_FIRST">특실 우선</option>
          </select>
        </label>
      </section>

      <section class="grid two">
        <label>
          빠른 출발
          <input id="earliestTime" type="time" step="60">
        </label>
        <label>
          늦은 출발
          <input id="latestTime" type="time" step="60">
        </label>
      </section>

      <section class="train-picker">
        <div class="section-head">
          <strong>실행할 열차</strong>
          <button id="searchTrains" type="button">열차 조회</button>
        </div>
        <label>
          열차번호
          <input id="trainNumbers" placeholder="예: 101,123">
        </label>
        <div id="trainList" class="train-list">조회한 열차가 없습니다.</div>
      </section>

      <section class="passengers">
        <label>
          어른
          <input id="adults" type="number" min="0" max="9" value="1">
        </label>
        <label>
          어린이
          <input id="children" type="number" min="0" max="9" value="0">
        </label>
        <label>
          유아
          <input id="toddlers" type="number" min="0" max="9" value="0">
        </label>
        <label>
          경로
          <input id="seniors" type="number" min="0" max="9" value="0">
        </label>
      </section>

      <section class="grid two compact">
        <label>
          반복 간격
          <input id="intervalSeconds" type="number" min="1" max="300" value="1">
        </label>
        <label>
          최대 시도
          <input id="maxAttempts" type="number" min="0" max="9999" value="0">
        </label>
      </section>

      <section class="toggles">
        <label>
          <input id="reserveWhenFound" type="checkbox" checked>
          좌석 발견 시 예약
        </label>
        <label>
          <input id="includeWaitingList" type="checkbox">
          예약대기 포함
        </label>
        <label>
          <input id="beep" type="checkbox" checked>
          알림음
        </label>
      </section>

      <div class="actions">
        <button id="saveConfig" type="button" class="primary">설정 저장</button>
        <button id="runMacro" type="button" class="run">실행</button>
        <button id="stopMacro" type="button" class="danger">멈춤</button>
      </div>

      <section class="log-panel">
        <div class="log-actions">
          <strong>실행 로그</strong>
          <div>
            <button id="refreshLog" type="button">새로고침</button>
            <button id="clearLog" type="button">지우기</button>
          </div>
        </div>
        <pre id="logOutput">아직 로그가 없습니다.</pre>
      </section>

      <datalist id="stations">
        <option value="서울"></option>
        <option value="용산"></option>
        <option value="영등포"></option>
        <option value="광명"></option>
        <option value="수원"></option>
        <option value="천안아산"></option>
        <option value="오송"></option>
        <option value="대전"></option>
        <option value="김천구미"></option>
        <option value="동대구"></option>
        <option value="신경주"></option>
        <option value="울산"></option>
        <option value="부산"></option>
        <option value="익산"></option>
        <option value="전주"></option>
        <option value="광주송정"></option>
        <option value="목포"></option>
        <option value="강릉"></option>
      </datalist>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
