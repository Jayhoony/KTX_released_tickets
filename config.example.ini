[account]
; 비워두면 실행 시 터미널에서 입력합니다.
; 환경변수 KORAIL_ID, KORAIL_PASSWORD 를 설정해도 됩니다.
id =
password =

[trip]
dep = 서울
arr = 부산
date = 20260501
time = 090000
train_type = KTX

; 특정 열차번호만 원하면 쉼표로 입력합니다. 예: 101,123
train_numbers =

; 출발시간 범위를 더 좁히고 싶을 때 사용합니다. 형식: hhmmss
earliest_time =
latest_time =

[passengers]
adults = 1
children = 0
toddlers = 0
seniors = 0

[macro]
interval_seconds = 1
jitter_seconds = 3
max_attempts = 0
login_max_attempts = 3

; true면 좌석 발견 즉시 예약을 시도합니다.
reserve_when_found = true

; GENERAL_ONLY, GENERAL_FIRST, SPECIAL_ONLY, SPECIAL_FIRST
reserve_option = GENERAL_ONLY

; 예약대기까지 시도하려면 둘 다 true로 바꾸세요.
include_waiting_list = false
try_waiting = false
auto_payment = false

[notification]
beep = true
